<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover + user-scalable=no: damit es sich am Handy wie eine App anfühlt -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>SideQuest</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css?v=2" />

  <!-- Supabase-Client direkt vom CDN (kein npm/Build nötig) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- =================== Kopfzeile (nur sichtbar, wenn eingeloggt) =================== -->
  <header id="appHeader" class="hidden">
    <span class="logo">SideQuest</span>
    <button id="logoutBtn" class="link-btn">Abmelden</button>
  </header>

  <main>

    <!-- =================== Screen 1: Login / Registrieren =================== -->
    <section id="authScreen" class="screen">
      <div class="card">
        <h1 class="brand">SideQuest</h1>
        <p class="subtitle">Eine Quest am Tag. Erst posten, dann sehen.</p>

        <!-- Anzeigename: nur beim Registrieren nötig -->
        <label id="usernameField" class="field hidden">
          <span>Anzeigename</span>
          <input id="usernameInput" type="text" autocomplete="username" placeholder="z. B. Niklas" />
        </label>

        <label class="field">
          <span>E-Mail</span>
          <input id="emailInput" type="email" autocomplete="email" placeholder="du@beispiel.de" />
        </label>

        <label class="field">
          <span>Passwort</span>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="mind. 6 Zeichen" />
        </label>

        <button id="primaryAuthBtn" class="btn">Login</button>

        <p class="toggle-line">
          <span id="toggleText">Noch kein Konto?</span>
          <button id="toggleModeBtn" class="link-btn">Registrieren</button>
        </p>

        <p id="authMessage" class="message"></p>
      </div>
    </section>

    <!-- =================== Screen 2: Heutige Quest =================== -->
    <section id="questScreen" class="screen hidden">
      <div class="card">
        <p class="label">Deine Quest heute</p>
        <h2 id="questTitle" class="quest-title">Lade Quest…</h2>

        <!-- Verstecktes Kamera-Input: der Button unten löst es aus -->
        <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />
        <button id="startQuestBtn" class="btn">📸 Quest starten</button>

        <p id="questMessage" class="message"></p>
      </div>
    </section>

    <!-- =================== Screen 3: Upload (Vorschau + Hochladen) =================== -->
    <section id="uploadScreen" class="screen hidden">
      <div class="card">
        <p class="label" id="uploadQuestLabel"></p>
        <img id="previewImage" class="preview" alt="Vorschau deines Fotos" />
        <button id="confirmUploadBtn" class="btn">Hochladen &amp; freischalten</button>
        <button id="retakeBtn" class="link-btn">Neues Foto machen</button>
        <p id="uploadMessage" class="message"></p>
      </div>
    </section>

    <!-- =================== Screen 4: Feed =================== -->
    <section id="feedScreen" class="screen hidden">
      <div class="feed-head">
        <p class="label">Heutige Beiträge</p>
        <h2 id="feedQuestTitle" class="feed-quest"></h2>
      </div>
      <div id="feedList" class="feed-list"></div>
      <p id="feedEmpty" class="message hidden">Noch keine weiteren Beiträge. Du bist früh dran! 🎉</p>
    </section>

  </main>

  <!-- Reihenfolge wichtig: erst Client, dann die Module, app.js zuletzt -->
  <script src="js/supabaseClient.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/quest.js?v=2"></script>
  <script src="js/upload.js?v=2"></script>
  <script src="js/feed.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
